# Decap CMS 配置
# 刘的博客 - 内容管理系统
#
# GitHub Pages 部署配置
# 使用 GitHub OAuth 认证
#
# 【OAuth 设置步骤】
#   1. 去 GitHub → Settings → Developer settings → OAuth Apps
#   2. 创建新应用：
#      - Application name: Liu's Blog CMS
#      - Homepage URL: https://liudeboke.com
#      - Authorization callback URL: https://liudeboke.com/admin/
#   3. 把 Client ID 和 Client Secret 填到下方
#
# 【本地测试】
#   如需本地测试，可改为 test-repo 后端
#
# 【内容更新后】
#   每次在CMS中发布内容后，GitHub会自动部署

backend:
  name: github
  repo: djdufud13-cell/Decap-CMS
  branch: main
  # OAuth 配置（需在 GitHub 创建 OAuth App 后填写）
  # base_url: https://liudeboke.com
  # auth_endpoint: admin/auth

# ============================================================
# 媒体文件设置
# ============================================================
media_folder: "assets/images"
public_folder: "/assets/images"

# ============================================================
# 博客文章集合
# ============================================================
collections:

  # ── 中文博客文章 ──
  - name: "posts-zh"
    label: "中文文章"
    label_singular: "中文文章"
    folder: "posts/zh"
    create: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "作者", name: "author", widget: "string", default: "刘工" }
      - { label: "摘要", name: "excerpt", widget: "text" }
      - { label: "标签（用逗号分隔）", name: "tags", widget: "string", default: "" }
      - { label: "封面图片", name: "cover", widget: "image", required: false }
      - { label: "文章内容（HTML）", name: "body", widget: "markdown" }

  # ── 英文博客文章 ──
  - name: "posts-en"
    label: "English Posts"
    label_singular: "English Post"
    folder: "posts/en"
    create: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Author", name: "author", widget: "string", default: "Liu" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Tags (comma separated)", name: "tags", widget: "string", default: "" }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - { label: "Content (HTML)", name: "body", widget: "markdown" }

  # ── 新闻资讯 ──
  - name: "news"
    label: "新闻资讯"
    label_singular: "新闻"
    folder: "news"
    create: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "类型", name: "type", widget: "select", options: ["行业新闻", "技术动态", "产品发布", "展会信息"] }
      - { label: "摘要", name: "excerpt", widget: "text" }
      - { label: "内容", name: "body", widget: "markdown" }
      - { label: "来源", name: "source", widget: "string", required: false }
